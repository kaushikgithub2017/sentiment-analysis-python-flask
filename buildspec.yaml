version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo Installing dependencies...
      - pip install -r requirements.txt
  build:
    commands:
      - echo Build started on `date`
      - echo Validating Python files...
      - python -m py_compile app.py sentiment_model.py
  post_build:
    commands:
      - echo Build completed on `date`
artifacts:
  files:
    - '**/*'